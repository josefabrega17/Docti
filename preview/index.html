<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docti Pro | Demo interactivo</title>
    <meta name="description" content="Demo interactivo de Docti Pro con flujo clínico simulado." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/theme.css" />
  </head>
  <body>
    <main class="preview-app" data-preview-root>
      <header class="preview-top">
        <a class="preview-brand" href="/pro/">
          <span class="brand__mark">d</span>
          <strong>Docti Pro</strong>
          <small>DEMO INTERACTIVO</small>
        </a>
        <div class="preview-top__right">
          <span data-demo-context>Nueva Consulta 2 / 7</span>
          <a href="/pro/">← Volver</a>
        </div>
      </header>

      <aside class="preview-side">
        <div>
          <small>FLUJO DE DEMO</small>
          <nav data-step-list aria-label="Pasos del demo"></nav>
        </div>
        <p>Demo simulado con datos de muestra para recorrer el flujo clínico de Docti Pro.</p>
      </aside>

      <section class="preview-main">
        <div class="preview-crumb">Consultas / <span data-demo-title>Nueva Consulta</span></div>
        <div class="preview-progress" data-inner-steps></div>
        <div class="preview-panel" data-demo-body></div>
        <div class="preview-actions">
          <button type="button" data-prev-step>Anterior</button>
          <button type="button" data-next-step>Siguiente →</button>
        </div>
      </section>
    </main>
    <script src="/data/preview-data.js"></script>
    <script src="/scripts/preview.js"></script>
  </body>
</html>
